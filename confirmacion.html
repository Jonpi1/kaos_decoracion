<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pedido Confirmado — Kaos Decoración</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='12' fill='%232C1A0E'/><text y='.9em' font-size='70' x='15' fill='%23C9A96E'>K</text></svg>">
</head>
<body>
<header id="header" style="position:relative;background:var(--c-white);border-bottom:1px solid var(--c-border)">
  <div class="container">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <img src="img/logo.png" alt="Kaos Decoración" class="logo-img">
      </a>
    </div>
  </div>
</header>
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;padding:40px 24px">
  <div class="container container--sm">
    <div id="confirmation-content">
      <div style="text-align:center;padding:60px 0">
        <div class="loader"></div>
        <p style="margin-top:16px;color:var(--c-gray)">Cargando confirmación...</p>
      </div>
    </div>
  </div>
</div>
<footer class="footer" style="margin-top:0">
  <div class="container">
    <div class="footer-bottom"><span>© 2025 Kaos Decoración · Madrid</span></div>
  </div>
</footer>
<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
